name: security

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - if: github.event_name == 'pull_request'
        name: Detect dependency graph support
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status="$(gh api "repos/${{ github.repository }}" --jq '.security_and_analysis.dependency_graph.status // "unsupported"' || echo unsupported)"
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          if [ "${status}" != "enabled" ]; then
            echo "::notice::Dependency graph is not enabled for this repository; skipping dependency audit."
          fi

      - if: github.event_name == 'pull_request' && steps.dependency-graph.outputs.status == 'enabled'
        name: Dependency Review Audit
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

      - if: github.event_name != 'pull_request'
        name: Dependency Audit Notice
        run: |
          echo "::notice::Dependency audit now runs through GitHub dependency review on pull requests; push runs rely on the merged PR receipt plus the remaining security scans in this workflow."

  secret-pattern-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Scan tracked sensitive material
        run: node scripts/check-sensitive-material.mjs

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install gitleaks CLI
        run: |
          set -euo pipefail
          version="8.30.1"
          archive="gitleaks_${version}_linux_x64.tar.gz"
          curl -fsSL -o "/tmp/${archive}" "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}"
          tar -xzf "/tmp/${archive}" -C /tmp
          echo "/tmp" >> "${GITHUB_PATH}"

      - name: Run gitleaks
        run: gitleaks git . --redact --no-banner --exit-code 1

  trufflehog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6 # v3.94.3
        with:
          path: ./
          extra_args: --results=verified,unknown --exclude-paths=.github/trufflehog-exclude-paths.txt

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          cache-dir: ${{ runner.temp }}/trivy-cache
          format: sarif
          output: trivy-results.sarif
          limit-severities-for-sarif: true
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: trivy-results.sarif
