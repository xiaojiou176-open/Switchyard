name: dependency-review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Detect dependency graph support
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status="$(gh api "repos/${{ github.repository }}" --jq '.security_and_analysis.dependency_graph.status // "unsupported"' || echo unsupported)"
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          if [ "${status}" != "enabled" ]; then
            echo "::notice::Dependency graph is not enabled for this repository; skipping dependency review."
          fi

      - name: Dependency Review
        if: steps.dependency-graph.outputs.status == 'enabled'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
