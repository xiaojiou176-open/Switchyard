version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:17"
      timezone: "America/Los_Angeles"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:17"
      timezone: "America/Los_Angeles"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
