      <stop offset="55%" stop-color="#15342c"/>
      <stop offset="100%" stop-color="#e7efe8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f4efe4"/>
      <stop offset="100%" stop-color="#dce8de"/>
    </linearGradient>
  </defs>
